<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Dupatta House - Raja Road, Dehradun</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #800020; /* Burgundy */
            --secondary: #D4AF37; /* Gold */
            --bg: #fffcf5;
            --text: #333;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
        }

        header {
            background-color: var(--primary);
            color: var(--secondary);
            padding: 2rem;
            text-align: center;
            border-bottom: 5px solid var(--secondary);
        }

        header h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 3.5rem;
            color: var(--secondary);
            margin: 0;
            letter-spacing: 2px;
            text-shadow: 2px 2px #fff;
        }

        .location {
            font-size: 1.1rem;
            color: #7f8c8d;
            margin-top: 0.5rem;
            font-weight: 600;
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 1rem;
        }

        .login-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--secondary);
        }

        .card h2 {
            color: var(--primary);
            border-bottom: 2px solid var(--secondary);
            display: inline-block;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
            color: var(--primary);
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(128, 0, 32, 0.3);
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-3px);
        }

        .admin-btn {
            background-color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .billing-btn {
            background-color: #25D366; /* WhatsApp Green */
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
        }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
            color: #888;
            margin-top: 50px;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .main-content {
                padding: 30px 15px;
            }
            .card {
                padding: 1.5rem;
            }
            .card h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Mini Dupatta House</h1>
        <div class="location">Dehradun's Finest Dupattas</div>
    </header>

    <div class="container">
        <div class="login-cards">
            <!-- STAFF LOGIN -->
            <div class="card">
                <h2>Staff Login</h2>
                <div class="form-group">
                    <label>SKU ID</label>
                    <input type="text" placeholder="Enter SKU ID...">
                </div>
                <div class="form-group">
                    <label>Rate (₹)</label>
                    <input type="number" placeholder="Enter Rate...">
                </div>
                <div class="form-group">
                    <label>Unit (e.g., Meters/Piece)</label>
                    <input type="text" placeholder="Enter Unit...">
                </div>
                <button onclick="alert('Staff data updated!')">Update Inventory</button>
            </div>

            <!-- BILLING LOGIN -->
            <div class="card">
                <h2>Billing Counter</h2>
                <div class="form-group">
                    <label>SKU ID</label>
                    <input type="text" placeholder="Scan or Enter SKU">
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" value="1">
                </div>
                <div class="form-group">
                    <label>Discount (%)</label>
                    <input type="number" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Payment Mode</label>
                    <select>
                        <option value="upi">UPI / QR</option>
                        <option value="cash">Cash</option>
                        <option value="card">Card</option>
                    </select>
                </div>
                <button class="billing-btn" onclick="alert('Invoice Generated Successfully!')">Generate Invoice</button>
            </div>

            <!-- ADMIN LOGIN -->
            <div class="card">
                <h2>Admin Panel</h2>
                <button onclick="alert('Checking Inventory...')">Check Inventory</button>
                <button onclick="alert('Testing Quantity...')" style="margin-top: 0.5rem;">Test Quantity On Site vs Books</button>
                <button onclick="alert('Viewing Sales Reports...')" style="margin-top: 0.5rem;">Sales Reports</button>
                <div style="margin-top: 1.5rem; font-size: 0.8rem; color: var(--primary);">
                    * Secure Admin Access
                </div>
            </div>
        </div>
    </div>

    <footer>
        © 2026 Mini Dupatta House | Raja Road, Dehradun | Powered by Klaus 🤟🐼🤟
    </footer>
</body>
</html>
