<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Dupatta House - Raja Road, Dehradun</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #800020; /* Burgundy */
            --secondary: #D4AF37; /* Gold */
            --bg: #fffcf5;
            --text: #333;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
        }

        header {
            background-color: var(--primary);
            color: var(--secondary);
            padding: 2rem;
            text-align: center;
            border-bottom: 5px solid var(--secondary);
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
        }

        .address {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 0.5rem;
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 1rem;
        }

        .login-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--secondary);
        }

        .card h2 {
            color: var(--primary);
            border-bottom: 2px solid var(--secondary);
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
        }

        input, select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        .admin-btn { background-color: #333; }
        .billing-btn { background-color: #138808; } /* Indian Green */

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.8rem;
            color: #888;
        }

        .pattern-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/p6.png');
            opacity: 0.05;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="pattern-bg"></div>
    <header>
        <h1>MINI DUPATTA HOUSE</h1>
        <div class="address">Raja Road, Dehradun, Uttarakhand</div>
    </header>

    <div class="container">
        <div class="login-cards">
            <!-- STAFF SECTION -->
            <div class="card">
                <h2>Inventory Entry (Staff)</h2>
                <div class="form-group">
                    <label>SKU ID</label>
                    <input type="text" placeholder="e.g. DUP- silk-001">
                </div>
                <div class="form-group">
                    <label>Rate (₹)</label>
                    <input type="number" placeholder="Enter price">
                </div>
                <div class="form-group">
                    <label>Unit</label>
                    <input type="text" placeholder="e.g. Meters per piece">
                </div>
                <button onclick="alert('Item Logged Successfully')">Update Entry</button>
            </div>

            <!-- BILLING SECTION -->
            <div class="card">
                <h2>Counter Billing</h2>
                <div class="form-group">
                    <label>SKU ID</label>
                    <input type="text" placeholder="Search SKU">
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" value="1">
                </div>
                <div class="form-group">
                    <label>Discount %</label>
                    <input type="number" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Payment Mode</label>
                    <select>
                        <option>UPI / QR</option>
                        <option>Cash</option>
                        <option>Card</option>
                    </select>
                </div>
                <button class="billing-btn" onclick="alert('Generating Bill...')">Generate Invoice</button>
            </div>

            <!-- ADMIN SECTION -->
            <div class="card">
                <h2>Admin Dashboard</h2>
                <button class="admin-btn">Check Inventory</button>
                <button class="admin-btn" style="margin-top:0.5rem">Physical vs Book Stock Check</button>
                <button class="admin-btn" style="margin-top:0.5rem">Sales Reports</button>
                <div style="margin-top: 1.5rem; font-size: 0.8rem; color: var(--primary);">
                    * Secure Admin Portal
                </div>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 Mini Dupatta House | Dehradun | Designed by Klaus 🤟🐼🤟
    </footer>
</body>
</html>
